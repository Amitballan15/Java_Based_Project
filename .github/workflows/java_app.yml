name: Java App Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # Build
    - name: Build
      run: mvn clean verify

    # Move JAR 
    - name: Move JAR
      run: |
        mkdir -p bankingappJar
        cp target/*.jar bankingappJar/

    # Debug 
    - name: Check JAR
      run: ls -la bankingappJar

    # Sonar Scan
    - name: Sonar Scan
      run: |
        mvn sonar:sonar \
        -Dsonar.projectKey=myapp \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Docker Build Step
    - name: Build Docker Image
      run: docker build -t myapp .

    # Trivy Scan
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Scan Docker Image
      run: trivy image myapp

        # DEBUG (Secrets check)
    - name: Debug Secrets
      run: |
        echo "User: ${{ secrets.VM_USER }}"
        echo "Host: ${{ secrets.VM_HOST }}"

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Copy Files to VM
      run: |
        scp -o StrictHostKeyChecking=no -r . ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/myapp

    - name: Deploy to VM
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
        cd ~/myapp
        docker stop myapp || true
        docker rm myapp || true
        docker build -t myapp .
        docker run -d -p 8080:8080 --name myapp myapp
        EOF
